esphome:
  name: m5stack-atom-echo
  friendly_name: M5Stack Atom Echo RF Proxy
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

# To be able to get logs from the device via serial and api.
logger:

# API is a requirement of the dashboard import.
api:
  id: api_id
  encryption:   # Uses key set by Home Assistant

ota:
  - platform: esphome
    id: ota_esphome

wifi:
  # Set up a wifi access point using the device name above
  ap:

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device.
captive_portal:

network:
  enable_ipv6: true

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    entity_category: diagnostic
    disabled_by_default: true

  - platform: restart
    id: restart_button
    name: "Restart"
    entity_category: config
    disabled_by_default: true
    icon: "mdi:restart"

# M5Stack RF433T (433 MHz transmitter) connected to the Atom Echo's
# Grove port. GPIO26 is the data pin.
remote_transmitter:
  id: rf_tx
  pin: GPIO26
  carrier_duty_percent: 100%

radio_frequency:
  # RF transmitter instance
  - platform: ir_rf_proxy
    name: RF Proxy Transmitter
    id: rf_proxy_tx
    remote_transmitter_id: rf_tx
    frequency: 433.92MHz
